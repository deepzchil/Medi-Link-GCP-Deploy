name: Enterprise CI/CD Pipeline (Separate Images Per Environment)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select deployment environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - production

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  DOTNET_VERSION: 8.0.x
  ARTIFACT_REPO: hospital-repo

  LEAD_EMAIL: ${{ vars.LEAD_EMAIL }}
  LEAD_NAME: ${{ vars.LEAD_NAME }}

  MANAGER_EMAIL: ${{ vars.MANAGER_EMAIL }}
  MANAGER_NAME: ${{ vars.MANAGER_NAME }}

  TEAM_CC: ${{ vars.TEAM_CC }}

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:

# ==========================================================
# BUILD JOB
# ==========================================================
  build:
    name: Build Application
    runs-on: ubuntu-latest

    outputs:
      service_name: ${{ steps.vars.outputs.service_name }}
      image_name: ${{ steps.vars.outputs.image_name }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Prepare Variables
        id: vars
        shell: bash
        run: |
          ENV="${{ github.event.inputs.environment }}"

          if [ "$ENV" = "dev" ]; then
            SERVICE="medilink-app-dev"
            IMAGE="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/medilink-app-dev:latest"

          elif [ "$ENV" = "test" ]; then
            SERVICE="medilink-app-test"
            IMAGE="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/medilink-app-test:latest"

          else
            SERVICE="medilink-app-production"
            IMAGE="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/medilink-app-production:latest"
          fi

          echo "service_name=$SERVICE" >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE" >> $GITHUB_OUTPUT

          echo "Service=$SERVICE"
          echo "Image=$IMAGE"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore HospitalMS.csproj

      - name: Build
        run: dotnet build HospitalMS.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish HospitalMS.csproj --configuration Release --no-build -o publish

      - name: Authenticate GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: docker build -t "${{ steps.vars.outputs.image_name }}" .

      - name: Push Docker Image
        run: docker push "${{ steps.vars.outputs.image_name }}"

# ==========================================================
# TEST / PROD LEAD APPROVAL
# ==========================================================
  lead-approval:
    if: github.event.inputs.environment == 'test' || github.event.inputs.environment == 'production'
    name: Lead Approval
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: lead-approval

    steps:
      - run: echo "Lead Approved"

# ==========================================================
# PROD MANAGER APPROVAL
# ==========================================================
  manager-approval:
    if: github.event.inputs.environment == 'production'
    name: Manager Approval
    needs: lead-approval
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - run: echo "Manager Approved"

# ==========================================================
# DEV DEPLOY
# ==========================================================
  deploy-dev:
    if: github.event.inputs.environment == 'dev'
    name: Deploy Dev
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Dev
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - run: |
          gcloud run deploy "${{ needs.build.outputs.service_name }}" \
            --image "${{ needs.build.outputs.image_name }}" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080

# ==========================================================
# TEST DEPLOY
# ==========================================================
  deploy-test:
    if: github.event.inputs.environment == 'test'
    name: Deploy Test
    needs:
      - build
      - lead-approval
    runs-on: ubuntu-latest

    steps:
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - run: |
          gcloud run deploy "${{ needs.build.outputs.service_name }}" \
            --image "${{ needs.build.outputs.image_name }}" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080

# ==========================================================
# PROD DEPLOY
# ==========================================================
  deploy-prod:
    if: github.event.inputs.environment == 'production'
    name: Deploy Production
    needs:
      - build
      - lead-approval
      - manager-approval
    runs-on: ubuntu-latest

    steps:
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - run: |
          gcloud run deploy "${{ needs.build.outputs.service_name }}" \
            --image "${{ needs.build.outputs.image_name }}" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080

# ==========================================================
# SUCCESS MAIL
# ==========================================================
  success-mail:
    name: Success Notification
    needs:
      - build
      - deploy-dev
      - deploy-test
      - deploy-prod
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send Success Mail
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: Deployment Completed | ${{ github.event.inputs.environment }}

          to: ${{ env.MANAGER_EMAIL }}
          cc: ${{ env.TEAM_CC }}
          from: ${{ secrets.EMAIL_USERNAME }}

          html_body: |
            <h2>Deployment Completed Successfully</h2>
            <p>Environment: ${{ github.event.inputs.environment }}</p>
            <p>Service: ${{ needs.build.outputs.service_name }}</p>
            <p>Image: ${{ needs.build.outputs.image_name }}</p>

# ==========================================================
# FAILURE MAIL
# ==========================================================
  failure-mail:
    if: failure()
    name: Failure Notification
    runs-on: ubuntu-latest

    steps:
      - name: Send Failure Mail
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: Deployment Failed | ${{ github.event.inputs.environment }}

          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}

          html_body: |
            <h2>Deployment Failed</h2>
            <p>Please review workflow logs.</p>
