name: Enterprise multi ENV CI/CD Pipeline (GCP Cloud Run)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select deployment environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  DOTNET_VERSION: 8.0.x
  SERVICE_NAME: medilink-app
  ARTIFACT_REPO: hospital-repo

  LEAD_EMAIL: ${{ vars.LEAD_EMAIL }}
  LEAD_NAME: ${{ vars.LEAD_NAME }}
  MANAGER_EMAIL: ${{ vars.MANAGER_EMAIL }}
  MANAGER_NAME: ${{ vars.MANAGER_NAME }}
  TEAM_CC: ${{ vars.TEAM_CC }}

permissions:
  contents: read
  issues: read
  id-token: write

jobs:

# =========================================
# BUILD + RELEASE NOTES
# =========================================
  build:
    runs-on: ubuntu-latest
    outputs:
      commit_message: ${{ steps.commit.outputs.commit_message }}
      change_stats: ${{ steps.stats.outputs.change_stats }}
      resolved_issues: ${{ steps.issues.outputs.resolved_issues }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Commit Message
        id: commit
        run: |
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Change Stats
        id: stats
        run: |
          echo "change_stats<<EOF" >> $GITHUB_OUTPUT
          git diff --stat HEAD~1 HEAD || true
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract Issues
        id: issues
        uses: actions/github-script@v7
        with:
          script: |
            const commits = require('child_process')
              .execSync("git log -10 --pretty=%B")
              .toString();

            const matches = [...commits.matchAll(/#(\d+)/g)];
            const issues = [...new Set(matches.map(m => m[1]))];

            if (!issues.length) {
              core.setOutput("resolved_issues","No linked issues.");
              return;
            }

            let output = "";
            for (const num of issues) {
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: Number(num)
                });
                output += `• #${num} - ${issue.data.title}\n`;
              } catch {
                output += `• #${num}\n`;
              }
            }
            core.setOutput("resolved_issues", output);

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: dotnet restore HospitalMS.csproj
      - run: dotnet build HospitalMS.csproj -c Release --no-restore
      - run: dotnet publish HospitalMS.csproj -c Release -o publish

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build & Push Image
        run: |
          IMAGE=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

# =========================================
# DEV DEPLOY (NO APPROVAL)
# =========================================
  deploy-dev:
    if: ${{ github.event.inputs.environment == 'dev' }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: |
          gcloud run deploy ${{ env.SERVICE_NAME }}-dev \
          --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated

# =========================================
# LEAD EMAIL (TEST + PROD)
# =========================================
  notify-lead:
    if: ${{ github.event.inputs.environment != 'dev' }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Send Lead Email
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Approval Required - ${{ github.event.inputs.environment }}"
          to: ${{ env.LEAD_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          cc: ${{ env.TEAM_CC }}

          html_body: |
            <h2>🚀 Deployment Request</h2>
            <p><b>Environment:</b> ${{ github.event.inputs.environment }}</p>

            <h3>📊 Changes</h3>
            <pre>${{ needs.build.outputs.change_stats }}</pre>

            <h3>✅ Issues Fixed</h3>
            <pre>${{ needs.build.outputs.resolved_issues }}</pre>

            <br>

            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              style="background:#198754;color:white;padding:14px 24px;text-decoration:none;border-radius:6px;">
              ✔ Review & Approve
            </a>

# =========================================
# LEAD APPROVAL
# =========================================
  lead-approval:
    if: ${{ github.event.inputs.environment != 'dev' }}
    needs: notify-lead
    runs-on: ubuntu-latest
    environment: test

    steps:
      - run: echo "Lead approved"

# =========================================
# TEST DEPLOY
# =========================================
  deploy-test:
    if: ${{ github.event.inputs.environment == 'test' }}
    needs: lead-approval
    runs-on: ubuntu-latest

    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: |
          gcloud run deploy ${{ env.SERVICE_NAME }}-test \
          --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated

# =========================================
# MANAGER EMAIL (PROD ONLY)
# =========================================
  notify-manager:
    if: ${{ github.event.inputs.environment == 'prod' }}
    needs: 
        - lead-approval
        - build
    runs-on: ubuntu-latest

    steps:
      - name: Send Manager Email
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Manager Approval Required - PROD"
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}

          html_body: |
            <h2>🚨 Production Approval Required</h2>

            <h3>✅ Issues Fixed</h3>
            <pre>${{ needs.build.outputs.resolved_issues }}</pre>

            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              style="background:#dc3545;color:white;padding:14px 24px;text-decoration:none;border-radius:6px;">
              Approve Production
            </a>

# =========================================
# MANAGER APPROVAL
# =========================================
  manager-approval:
    if: ${{ github.event.inputs.environment == 'prod' }}
    needs: notify-manager
    runs-on: ubuntu-latest
    environment: production

    steps:
      - run: echo "Manager approved"

# =========================================
# PROD DEPLOY
# =========================================
  deploy-prod:
    if: ${{ github.event.inputs.environment == 'prod' }}
    needs: manager-approval
    runs-on: ubuntu-latest

    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated

# =========================================
# SUCCESS EMAIL (SAFE FIX)
# =========================================
  success-mail:
    needs:
        - build
        - deploy-dev
        - deploy-test
        - deploy-prod

    if: |
        always() && (
            needs.deploy-dev.result == 'success' ||
            needs.deploy-test.result == 'success' ||
            needs.deploy-prod.result == 'success'
        )

    runs-on: ubuntu-latest

    steps:
    - name: Send Success Email
      uses: dawidd6/action-send-mail@v5
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        from: ${{ secrets.EMAIL_USERNAME }}

        subject: "✅ Deployment Successful"
        to: ${{ env.LEAD_EMAIL }}

        html_body: |
          <h2>🎉 Deployment Successful</h2>
          <p><b>Environment:</b> ${{ github.event.inputs.environment }}</p>

          <h3>✅ Issues Fixed</h3>
          <pre>${{ needs.build.outputs.resolved_issues || 'No issues found' }}</pre>