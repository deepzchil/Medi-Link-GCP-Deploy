name: Dynamic CI/CD Pipeline (Multi-Env)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  DOTNET_VERSION: 8.0.x
  BASE_SERVICE_NAME: medilink-app
  ARTIFACT_REPO: hospital-repo
  LEAD_EMAIL: ${{ vars.LEAD_EMAIL }}
  LEAD_NAME: ${{ vars.LEAD_NAME }}
  MANAGER_EMAIL: ${{ vars.MANAGER_EMAIL }}
  MANAGER_NAME: ${{ vars.MANAGER_NAME }}
  TEAM_CC: ${{ vars.TEAM_CC }}

permissions:
  contents: read
  actions: read
  issues: read
  id-token: write

jobs:
  # -------------------------------------------------
  # JOB 1 - BUILD + FETCH ISSUES
  # -------------------------------------------------
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.diff.outputs.changed_files }}
      commit_message: ${{ steps.commit.outputs.commit_message }}
      resolved_issues: ${{ steps.issues.outputs.resolved_issues }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 5

      - name: Read Metadata
        id: commit
        run: |
          echo "commit_message=$(git log -1 --pretty=%B | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Detect Changes
        id: diff
        run: |
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only HEAD~1 HEAD >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Fixed GitHub Issues
        id: issues
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require('child_process');
            const commits = execSync("git log -10 --pretty=%B").toString();
            const matches = [...commits.matchAll(/#(\d+)/g)];
            const uniqueIssues = [...new Set(matches.map(m => m[1]))];
            let output = uniqueIssues.length > 0 ? "" : "No linked issues.";
            for (const issueNumber of uniqueIssues) {
               try {
                 const issue = await github.rest.issues.get({
                   owner: context.repo.owner,
                   repo: context.repo.repo,
                   issue_number: parseInt(issueNumber)
                 });
                 output += `• #${issueNumber} - ${issue.data.title}\n`;
               } catch { output += `• #${issueNumber} - Private/Deleted\n`; }
            }
            core.setOutput("resolved_issues", output);

      - name: Setup & Build .NET
        run: |
          dotnet restore HospitalMS.csproj
          dotnet publish HospitalMS.csproj -c Release -o publish

      - name: Auth & Push to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Docker Ops
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.BASE_SERVICE_NAME }}:latest .
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.BASE_SERVICE_NAME }}:latest

  # -------------------------------------------------
  # JOB 2 - LEAD APPROVAL EMAIL (Required for Test & Prod)
  # -------------------------------------------------
  lead-mail:
    name: Send Lead Approval Mail
    needs: build
    if: github.event.inputs.environment == 'test' || github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    steps:
      - name: Send Mail
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Approval Required [${{ github.event.inputs.environment }}] | ${{ github.repository }}
          to: ${{ env.LEAD_EMAIL }}
          cc: ${{ github.event.inputs.environment == 'prod' && env.TEAM_CC || '' }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: "Please approve deployment for ${{ github.event.inputs.environment }} environment."

  # -------------------------------------------------
  # JOB 3 - LEAD APPROVAL GATE
  # -------------------------------------------------
  lead-approval:
    name: Lead Approval Gate
    needs: lead-mail
    runs-on: ubuntu-latest
    environment: lead-approval # Ensure this environment exists in GitHub Settings
    steps:
      - run: echo "Lead Approved"

  # -------------------------------------------------
  # JOB 4 - MANAGER APPROVAL EMAIL (Prod Only)
  # -------------------------------------------------
  manager-mail:
    name: Send Manager Approval Mail
    needs: [lead-approval, build]
    if: github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    steps:
      - name: Send Mail
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Manager Approval Required [Production]
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: "Lead has approved. Manager approval required for Production."

  # -------------------------------------------------
  # JOB 5 - MANAGER APPROVAL GATE
  # -------------------------------------------------
  manager-approval:
    name: Manager Approval Gate
    needs: manager-mail
    runs-on: ubuntu-latest
    environment: production # Ensure this environment exists in GitHub Settings
    steps:
      - run: echo "Manager Approved"

  # -------------------------------------------------
  # JOB 6 - DEPLOYMENT (Logic handles dependency)
  # -------------------------------------------------
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest

    needs:
      - build
      - lead-approval
      - manager-approval

    if: |
      github.event.inputs.environment == 'dev' ||
      (github.event.inputs.environment == 'test' && needs.lead-approval.result == 'success') ||
      (github.event.inputs.environment == 'prod' && needs.manager-approval.result == 'success')

    steps:
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Deploy to Cloud Run
      run: |
        SERVICE_NAME="${{ env.BASE_SERVICE_NAME }}-${{ github.event.inputs.environment }}"

        # Force production naming
        if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
          SERVICE_NAME="medilink-app-production"
        fi

        echo "Deploying to service: $SERVICE_NAME"

        gcloud run deploy $SERVICE_NAME \
          --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.BASE_SERVICE_NAME }}:latest \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --timeout 300