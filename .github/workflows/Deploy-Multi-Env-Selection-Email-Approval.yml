name: Deploy-Multi-Approval-MediLink

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select deployment environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: medilink-app
  LEAD_EMAIL: ${{ secrets.LEAD_EMAIL }}
  MANAGER_EMAIL: ${{ secrets.MANAGER_EMAIL }}
  TEAM_CC: ${{ secrets.TEAM_CC }}

jobs:

# =========================================
# BUILD PACKAGE
# =========================================
  build:
    name: Build Website Package
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Dependencies
        run: dotnet restore HospitalMS.csproj

      - name: Build Solution
        run: dotnet build HospitalMS.csproj --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test HospitalMS.csproj --no-build || true

      - name: Publish App
        run: dotnet publish HospitalMS.csproj -c Release -o publish

      - name: Set Image Name
        id: meta
        run: |
          IMAGE=gcr.io/${{ env.PROJECT_ID }}/medilink:${{ github.run_number }}
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

# =========================================
# SEND LEAD APPROVAL MAIL
# =========================================
  send-lead-mail:
    if: ${{ github.event.inputs.environment == 'test' || github.event.inputs.environment == 'prod' }}
    needs: build
    name: Send Lead Approval Mail
    runs-on: ubuntu-latest

    steps:
      - name: Email Lead
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Lead Approval Required - MediLink Deployment
          to: ${{ env.LEAD_EMAIL }}
          cc: ${{ env.TEAM_CC }}
          from: GitHub Actions
          body: |
            Deployment Request for MediLink

            Environment: ${{ github.event.inputs.environment }}
            Triggered By: ${{ github.actor }}
            Run Number: ${{ github.run_number }}

            Please approve in GitHub Environments.

# =========================================
# LEAD APPROVAL
# =========================================
  lead-approval:
    if: ${{ github.event.inputs.environment == 'test' || github.event.inputs.environment == 'prod' }}
    needs: send-lead-mail
    name: Lead Approval
    runs-on: ubuntu-latest
    environment:
      name: lead-approval

    steps:
      - run: echo "Lead approved deployment"

# =========================================
# SEND MANAGER MAIL
# =========================================
  send-manager-mail:
    if: ${{ github.event.inputs.environment == 'prod' }}
    needs: lead-approval
    name: Send Manager Approval Mail
    runs-on: ubuntu-latest

    steps:
      - name: Email Manager
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Production Approval Required - MediLink
          to: ${{ env.MANAGER_EMAIL }}
          cc: ${{ env.TEAM_CC }}
          from: GitHub Actions
          body: |
            Production Deployment Request

            Lead approval completed.
            Environment: PROD
            Triggered By: ${{ github.actor }}

            Please approve in GitHub Environments.

# =========================================
# MANAGER APPROVAL
# =========================================
  manager-approval:
    if: ${{ github.event.inputs.environment == 'prod' }}
    needs: send-manager-mail
    name: Production Approval
    runs-on: ubuntu-latest
    environment:
      name: manager-approval

    steps:
      - run: echo "Manager approved production deployment"

# =========================================
# DEPLOY DEV
# =========================================
  deploy-dev:
    if: ${{ github.event.inputs.environment == 'dev' }}
    needs: build
    name: Deploy to DEV
    runs-on: ubuntu-latest

    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: |
          gcloud run deploy medilink-app-dev \
            --image gcr.io/${{ env.PROJECT_ID }}/medilink:${{ github.run_number }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --timeout 300

# =========================================
# DEPLOY TEST
# =========================================
  deploy-test:
    if: ${{ github.event.inputs.environment == 'test' }}
    needs: lead-approval
    name: Deploy to TEST
    runs-on: ubuntu-latest

    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: |
          gcloud run deploy medilink-app-test \
            --image gcr.io/${{ env.PROJECT_ID }}/medilink:${{ github.run_number }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --timeout 300

# =========================================
# DEPLOY PROD
# =========================================
  deploy-prod:
    if: ${{ github.event.inputs.environment == 'prod' }}
    needs: manager-approval
    name: Deploy to GCP Cloud Run
    runs-on: ubuntu-latest

    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: |
          gcloud run deploy medilink-app-production \
            --image gcr.io/${{ env.PROJECT_ID }}/medilink:${{ github.run_number }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --timeout 300

# =========================================
# SUCCESS MAIL
# =========================================
  success-mail:
    if: success()
    needs:
      - deploy-dev
      - deploy-test
      - deploy-prod
    name: Send Deployment Success Mail
    runs-on: ubuntu-latest

    steps:
      - name: Email Success
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: MediLink Deployment Successful
          to: ${{ env.TEAM_CC }}
          from: GitHub Actions
          body: |
            Deployment completed successfully.

            Environment: ${{ github.event.inputs.environment }}
            Run Number: ${{ github.run_number }}

# =========================================
# FAILURE MAIL
# =========================================
  failure-mail:
    if: failure()
    needs:
      - build
      - deploy-dev
      - deploy-test
      - deploy-prod
    name: Send Deployment Failure Mail
    runs-on: ubuntu-latest

    steps:
      - name: Email Failure
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: MediLink Deployment Failed
          to: ${{ env.TEAM_CC }}
          from: GitHub Actions
          body: |
            Deployment failed.

            Environment: ${{ github.event.inputs.environment }}
            Run Number: ${{ github.run_number }}