name: Enterprise Multi-Env CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: medilink-app
  ARTIFACT_REPO: hospital-repo
  DOTNET_VERSION: 8.0.x

  LEAD_EMAIL: ${{ vars.LEAD_EMAIL }}
  LEAD_NAME: ${{ vars.LEAD_NAME }}

  MANAGER_EMAIL: ${{ vars.MANAGER_EMAIL }}
  MANAGER_NAME: ${{ vars.MANAGER_NAME }}

  TEAM_CC: ${{ vars.TEAM_CC }}

#########################################################
# JOB 1 - BUILD JOB
#########################################################
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      commit_message: ${{ steps.commit.outputs.msg }}
      issues: ${{ steps.issues.outputs.list }}
      changes: ${{ steps.changes.outputs.files }}
      image: ${{ steps.image.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Get Commit Message
        id: commit
        run: |
          echo "msg=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Get Changed Files
        id: changes
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD | tr '\n' '<br>')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Fetch Closed Issues
        id: issues
        run: |
          ISSUES=$(curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/issues?state=closed" \
          | jq -r '.[].title' | head -10 | sed 's/$/<br>/')

          {
          echo "list<<EOF"
          echo "$ISSUES"
          echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore HospitalMS.csproj

      - name: Build
        run: dotnet build HospitalMS.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish HospitalMS.csproj --configuration Release --no-build -o publish

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build \
          -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest .

      - name: Push Docker Image
        run: |
          docker push \
          us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest


      - name: Set Image Output
        id: image
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest"
          echo "tag=$IMAGE" >> $GITHUB_OUTPUT
        

#########################################################
# JOB 2 - DEV DEPLOY (NO APPROVAL)
#########################################################
  deploy-dev:
    if: github.event.inputs.environment == 'dev'
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    outputs:
      service_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to DEV
        id: deploy
        run: |
          gcloud run deploy medilink-app-dev \
            --image ${{ needs.build.outputs.image }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --quiet

          URL=$(gcloud run services describe medilink-app-dev \
            --region ${{ env.REGION }} \
            --format='value(status.url)')

          echo "url=$URL" >> $GITHUB_OUTPUT

#########################################################
# JOB 3 - TEST DEPLOY (LEAD APPROVAL)
#########################################################
  deploy-test:
    if: github.event.inputs.environment == 'test'
    needs: build
    runs-on: ubuntu-latest
    environment: test

    outputs:
      service_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to TEST
        id: deploy
        run: |
          gcloud run deploy medilink-app-test \
            --image ${{ needs.build.outputs.image }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --quiet

          URL=$(gcloud run services describe medilink-app-test \
            --region ${{ env.REGION }} \
            --format='value(status.url)')

          echo "url=$URL" >> $GITHUB_OUTPUT

#########################################################
# JOB 4 - PROD APPROVAL - LEAD
#########################################################
  prod-lead-approval:
    if: github.event.inputs.environment == 'prod'
    needs: build
    runs-on: ubuntu-latest
    environment: prod-lead
    steps:
      - run: echo "Lead Approved"

#########################################################
# JOB 5 - PROD APPROVAL - MANAGER
#########################################################
  prod-manager-approval:
    if: github.event.inputs.environment == 'prod'
    needs: prod-lead-approval
    runs-on: ubuntu-latest
    environment: prod-manager
    steps:
      - run: echo "Manager Approved"

#########################################################
# JOB 6 - PROD DEPLOY
#########################################################
  deploy-prod:
    if: github.event.inputs.environment == 'prod'
    needs:
      - build
      - prod-manager-approval
    runs-on: ubuntu-latest

    outputs:
      service_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to PROD
        id: deploy
        run: |
          gcloud run deploy medilink-app-production \
            --image ${{ needs.build.outputs.image }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --quiet

          URL=$(gcloud run services describe medilink-app-production \
            --region ${{ env.REGION }} \
            --format='value(status.url)')

          echo "url=$URL" >> $GITHUB_OUTPUT

#########################################################
# JOB 7 - SUCCESS EMAIL
#########################################################
  success-mail:
    if: success()
    needs:
      - build
      - deploy-dev
      - deploy-test
      - deploy-prod

    runs-on: ubuntu-latest

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          from: ${{ secrets.EMAIL_USERNAME }}
          subject: "Deployment Success - ${{ github.event.inputs.environment }}"
          to: >
            ${{ github.event.inputs.environment == 'prod' && env.MANAGER_EMAIL || env.LEAD_EMAIL }}
          cc: ${{ env.TEAM_CC }}

          html_body: |
            <h2>Deployment Successful</h2>

            <table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;width:100%;">
              <tr><td><b>Repository</b></td><td>${{ github.repository }}</td></tr>
              <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
              <tr><td><b>Status</b></td><td style="color:green;"><b>SUCCESS</b></td></tr>
              <tr><td><b>Triggered By</b></td><td>${{ github.actor }}</td></tr>
              <tr><td><b>Commit ID</b></td><td>${{ github.sha }}</td></tr>
              <tr><td><b>Commit Message</b></td><td>${{ needs.build.outputs.commit_message }}</td></tr>
              <tr><td><b>Environment</b></td><td>${{ github.event.inputs.environment }}</td></tr>
              <tr><td><b>Application URL</b></td>
              <td>
                <a href="${{ needs.deploy-dev.outputs.service_url || needs.deploy-test.outputs.service_url || needs.deploy-prod.outputs.service_url }}">
                  Open App
                </a>
              </td></tr>
            </table>

            <h3>Fixed Issues</h3>
            ${{ needs.build.outputs.issues }}

            <h3>Changed Files</h3>
            ${{ needs.build.outputs.changes }}

#########################################################
# JOB 8 - FAILURE EMAIL
#########################################################
  failure-mail:
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Send Failure Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          from: ${{ secrets.EMAIL_USERNAME }}

          subject: "Deployment FAILED - ${{ github.event.inputs.environment }}"

          to: >
            ${{ github.event.inputs.environment == 'prod' && env.MANAGER_EMAIL || env.LEAD_EMAIL }}

          html_body: |
            <h2 style="color:red;">Deployment Failed</h2>

            <p><b>Environment:</b> ${{ github.event.inputs.environment }}</p>
            <p><b>Repository:</b> ${{ github.repository }}</p>

            <p>
              <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                View Logs
              </a>
            </p>