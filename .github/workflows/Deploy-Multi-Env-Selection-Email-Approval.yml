name: Deploy-Multi-Env-Approval-Final

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Choose environment"
        required: true
        type: choice
        options: [dev, test, prod]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPOSITORY: hospital-repo
  IMAGE_NAME: medilink-app

  LEAD_EMAIL: ${{ vars.LEAD_EMAIL }}
  LEAD_NAME: ${{ vars.LEAD_NAME }}
  MANAGER_EMAIL: ${{ vars.MANAGER_EMAIL }}
  MANAGER_NAME: ${{ vars.MANAGER_NAME }}
  TEAM_CC: ${{ vars.TEAM_CC }}

permissions:
  contents: read
  id-token: write

jobs:

# ================= BUILD =================
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      commit_message: ${{ steps.commit.outputs.commit_message }}
      changed_files: ${{ steps.diff.outputs.changed_files }}
      change_stats: ${{ steps.stats.outputs.change_stats }}
      code_changes: ${{ steps.patch.outputs.code_changes }}
      resolved_issues: ${{ steps.issues.outputs.resolved_issues }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - id: commit
        run: |
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - id: diff
        run: |
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only HEAD~1 HEAD || true
          echo "EOF" >> $GITHUB_OUTPUT

      - id: stats
        run: |
          echo "change_stats<<EOF" >> $GITHUB_OUTPUT
          git diff --stat HEAD~1 HEAD || true
          echo "EOF" >> $GITHUB_OUTPUT

      - id: patch
        run: |
          echo "code_changes<<EOF" >> $GITHUB_OUTPUT
          git diff --stat HEAD~1 HEAD || true
          echo "EOF" >> $GITHUB_OUTPUT

      - id: issues
        run: |
          echo "resolved_issues<<EOF" >> $GITHUB_OUTPUT
          echo "No linked issues found."
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - id: meta
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

# ================= DEV =================
  deploy-dev:
    if: ${{ github.event.inputs.environment == 'dev' }}
    needs: build
    runs-on: ubuntu-latest
    outputs:
      service_url: ${{ steps.url.outputs.service_url }}

    steps:
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - run: |
          gcloud run deploy medilink-app-dev \
            --image ${{ needs.build.outputs.image }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated

      - id: url
        run: |
          URL=$(gcloud run services describe medilink-app-dev --region ${{ env.REGION }} --format='value(status.url)')
          echo "service_url=$URL" >> $GITHUB_OUTPUT

# ================= TEST =================
  send-lead-mail-test:
    if: ${{ github.event.inputs.environment == 'test' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "TEST Approval Required"
          to: ${{ env.LEAD_EMAIL }}
          cc: ${{ env.TEAM_CC }}
          from: GitHub Actions
          html_body: |
            <h3>TEST Approval Required</h3>
            <pre>${{ needs.build.outputs.resolved_issues }}</pre>

  lead-approval-test:
    if: ${{ github.event.inputs.environment == 'test' }}
    needs: send-lead-mail-test
    runs-on: ubuntu-latest
    environment:
      name: lead-approval
    steps:
      - run: echo "Waiting for approval"

  deploy-test:
    if: ${{ github.event.inputs.environment == 'test' }}
    needs: [build, lead-approval-test]
    runs-on: ubuntu-latest
    outputs:
      service_url: ${{ steps.url.outputs.service_url }}

    steps:
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - run: |
          gcloud run deploy medilink-app-test \
            --image ${{ needs.build.outputs.image }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated

      - id: url
        run: |
          URL=$(gcloud run services describe medilink-app-test --region ${{ env.REGION }} --format='value(status.url)')
          echo "service_url=$URL" >> $GITHUB_OUTPUT

# ================= PROD =================
  send-lead-mail-prod:
    if: ${{ github.event.inputs.environment == 'prod' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "PROD Lead Approval Required"
          to: ${{ env.LEAD_EMAIL }}
          cc: ${{ env.TEAM_CC }}
          from: GitHub Actions
          html_body: "<h3>Production Approval Required</h3>"

  lead-approval-prod:
    if: ${{ github.event.inputs.environment == 'prod' }}
    needs: send-lead-mail-prod
    runs-on: ubuntu-latest
    environment:
      name: lead-approval
    steps:
      - run: echo "Lead approval"

  send-manager-mail:
    if: ${{ github.event.inputs.environment == 'prod' }}
    needs: lead-approval-prod
    runs-on: ubuntu-latest
    steps:
      - uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Manager Approval Required"
          to: ${{ env.MANAGER_EMAIL }}
          from: GitHub Actions
          html_body: "<h3>Manager Approval Required</h3>"

  manager-approval:
    if: ${{ github.event.inputs.environment == 'prod' }}
    needs: send-manager-mail
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - run: echo "Manager approval"

  deploy-prod:
    if: ${{ github.event.inputs.environment == 'prod' }}
    needs: [build, manager-approval]
    runs-on: ubuntu-latest
    outputs:
      service_url: ${{ steps.url.outputs.service_url }}

    steps:
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - run: |
          gcloud run deploy medilink-app-production \
            --image ${{ needs.build.outputs.image }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated

      - id: url
        run: |
          URL=$(gcloud run services describe medilink-app-production --region ${{ env.REGION }} --format='value(status.url)')
          echo "service_url=$URL" >> $GITHUB_OUTPUT

# ================= SUCCESS =================
  success-mail:
    if: success()
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deployment Successful"

# ================= FAILURE =================
  failure-mail:
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Deployment Failed"
          to: ${{ env.MANAGER_EMAIL }}
          from: GitHub Actions
          html_body: "<h2 style='color:red;'>Deployment Failed</h2>"