                .badge { display: inline-block; background: #ffebee; color: #c62828; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
                .section { padding: 24px 32px; }
                .section h2 { font-size: 16px; color: #1a1a2e; margin: 0 0 14px; border-bottom: 2px solid #ffcdd2; padding-bottom: 8px; }
                .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
                .meta-item { background: #fff5f5; border-radius: 8px; padding: 12px 14px; }
                .meta-item .label { font-size: 11px; text-transform: uppercase; color: #e53935; font-weight: 600; letter-spacing: 0.5px; }
                .meta-item .value { font-size: 14px; color: #1a1a2e; margin-top: 4px; font-weight: 500; }
                .changelog { background: #fff5f5; border-left: 4px solid #c62828; border-radius: 0 8px 8px 0; padding: 14px 18px; }
                .changelog ul { margin: 0; padding-left: 20px; }
                .changelog li { font-size: 14px; color: #333; line-height: 1.7; }
                .approval-chain { background: #fce4ec; border-radius: 8px; padding: 14px 18px; margin: 16px 0; }
                .approval-chain p { margin: 0; font-size: 14px; color: #880e4f; }
                .step { display: inline-block; background: #c62828; color: #fff; border-radius: 50%; width: 22px; height: 22px; text-align: center; line-height: 22px; font-size: 12px; font-weight: 700; margin-right: 6px; }
                .cta { text-align: center; padding: 8px 32px 28px; }
                .btn { display: inline-block; background: #c62828; color: #fff; text-decoration: none; padding: 12px 32px; border-radius: 8px; font-weight: 700; font-size: 15px; }
                .footer { background: #f4f6f9; padding: 16px 32px; text-align: center; font-size: 12px; color: #9e9e9e; }
                .env-pill { background: #ffebee; color: #c62828; font-weight: 700; padding: 2px 10px; border-radius: 12px; font-size: 13px; }
              </style>
            </head>
            <body>
              <div class="wrapper">
                <div class="header">
                  <h1>🔴 Production Deployment — Lead Approval</h1>
                  <p>Hi ${{ env.LEAD_NAME }}, a PRODUCTION deployment is awaiting your review.</p>
                </div>
                <div class="section">
                  <span class="badge">⏳ Awaiting Lead</span>&nbsp;&nbsp;<span class="env-pill">PRODUCTION</span>
                  <br><br>
                  <div class="approval-chain">
                    <p><span class="step">1</span> <strong>Lead approval</strong> — you are here</p>
                    <p style="margin-top:8px"><span class="step">2</span> Manager approval — after you approve</p>
                    <p style="margin-top:8px"><span class="step">3</span> Deployment to <strong>medilink-app-production</strong></p>
                  </div>
                  <div class="meta-grid">
                    <div class="meta-item"><div class="label">Environment</div><div class="value">Production</div></div>
                    <div class="meta-item"><div class="label">Cloud Run Service</div><div class="value">medilink-app-production</div></div>
                    <div class="meta-item"><div class="label">Requested by</div><div class="value">${{ github.actor }}</div></div>
                    <div class="meta-item"><div class="label">Run #</div><div class="value">${{ github.run_number }}</div></div>
                    <div class="meta-item"><div class="label">Branch</div><div class="value">${{ github.ref_name }}</div></div>
                    <div class="meta-item"><div class="label">Commit</div><div class="value">${{ github.sha }}</div></div>
                  </div>
                </div>
                <div class="section">
                  <h2>📋 Issues Fixed / Changes in This Release</h2>
                  <div class="changelog">
                    <ul>
                      ${{ needs.build.outputs.changelog }}
                    </ul>
                  </div>
                </div>
                <div class="cta">
                  <a class="btn" href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                    👉 Review &amp; Approve on GitHub
                  </a>
                </div>
                <div class="footer">MediLink CI/CD · GitHub Actions · ${{ github.repository }}</div>
              </div>
            </body>
            </html>

  # Gate 1 — Lead must approve before manager is notified
  lead-approval-prod:
    name: 🔐 Lead Approval Gate (PROD)
    needs: [build, notify-lead-prod]
    if: ${{ github.event.inputs.environment == 'prod' }}
    runs-on: ubuntu-latest
    environment: prod-lead   # GitHub Env with Lead as Required Reviewer

    steps:
      - name: Lead approved — proceeding to Manager notification
        run: echo "Lead approved the PROD deployment. Notifying Manager."

  notify-manager-prod:
    name: 📧 Notify Manager — PROD final approval required
    needs: [build, lead-approval-prod]       # ← only fires after lead gate passes
    if: ${{ github.event.inputs.environment == 'prod' }}
    runs-on: ubuntu-latest

    steps:
      - name: Send approval request email to Manager
        uses: dawidd6/action-send-mail@v2
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          from: ${{ secrets.EMAIL_USERNAME }}
          to: ${{ env.MANAGER_EMAIL }}
          cc: ${{ env.LEAD_EMAIL }},${{ env.TEAM_CC }}
          subject: "🔴 [PROD] Manager Final Approval Required — MediLink Deploy #${{ github.run_number }}"
          content_type: text/html
          body: |
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="UTF-8">
              <style>
                body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 0; }
                .wrapper { max-width: 640px; margin: 32px auto; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
                .header { background: linear-gradient(135deg, #4a148c, #311b92); padding: 28px 32px; color: #fff; }
                .header h1 { margin: 0; font-size: 22px; font-weight: 700; }
                .header p  { margin: 6px 0 0; opacity: 0.85; font-size: 14px; }
                .badge { display: inline-block; background: #f3e5f5; color: #6a1b9a; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
                .section { padding: 24px 32px; }
                .section h2 { font-size: 16px; color: #1a1a2e; margin: 0 0 14px; border-bottom: 2px solid #e1bee7; padding-bottom: 8px; }
                .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
                .meta-item { background: #faf0ff; border-radius: 8px; padding: 12px 14px; }
                .meta-item .label { font-size: 11px; text-transform: uppercase; color: #7b1fa2; font-weight: 600; letter-spacing: 0.5px; }
                .meta-item .value { font-size: 14px; color: #1a1a2e; margin-top: 4px; font-weight: 500; }
                .changelog { background: #faf0ff; border-left: 4px solid #4a148c; border-radius: 0 8px 8px 0; padding: 14px 18px; }
                .changelog ul { margin: 0; padding-left: 20px; }
                .changelog li { font-size: 14px; color: #333; line-height: 1.7; }
                .approval-chain { background: #ede7f6; border-radius: 8px; padding: 14px 18px; margin: 16px 0; }
                .step-done { display: inline-block; background: #43a047; color: #fff; border-radius: 50%; width: 22px; height: 22px; text-align: center; line-height: 22px; font-size: 12px; font-weight: 700; margin-right: 6px; }
                .step { display: inline-block; background: #4a148c; color: #fff; border-radius: 50%; width: 22px; height: 22px; text-align: center; line-height: 22px; font-size: 12px; font-weight: 700; margin-right: 6px; }
                .cta { text-align: center; padding: 8px 32px 28px; }
                .btn { display: inline-block; background: #4a148c; color: #fff; text-decoration: none; padding: 12px 32px; border-radius: 8px; font-weight: 700; font-size: 15px; }
                .footer { background: #f4f6f9; padding: 16px 32px; text-align: center; font-size: 12px; color: #9e9e9e; }
                .env-pill { background: #ffebee; color: #c62828; font-weight: 700; padding: 2px 10px; border-radius: 12px; font-size: 13px; }
              </style>
            </head>
            <body>
              <div class="wrapper">
                <div class="header">
                  <h1>🔴 Production Deployment — Final Manager Approval</h1>
                  <p>Hi ${{ env.MANAGER_NAME }}, Lead has approved. Your sign-off is the final gate.</p>
                </div>
                <div class="section">
                  <span class="badge">⏳ Awaiting Manager</span>&nbsp;&nbsp;<span class="env-pill">PRODUCTION</span>
                  <br><br>
                  <div class="approval-chain">
                    <p><span class="step-done">✓</span> <strong>Lead approval</strong> — completed by ${{ env.LEAD_NAME }}</p>
                    <p style="margin-top:8px"><span class="step">2</span> <strong>Manager approval</strong> — you are here</p>
                    <p style="margin-top:8px"><span class="step">3</span> Deployment to <strong>medilink-app-production</strong></p>
                  </div>
                  <div class="meta-grid">
                    <div class="meta-item"><div class="label">Environment</div><div class="value">Production</div></div>
                    <div class="meta-item"><div class="label">Cloud Run Service</div><div class="value">medilink-app-production</div></div>
                    <div class="meta-item"><div class="label">Requested by</div><div class="value">${{ github.actor }}</div></div>
                    <div class="meta-item"><div class="label">Run #</div><div class="value">${{ github.run_number }}</div></div>
                    <div class="meta-item"><div class="label">Branch</div><div class="value">${{ github.ref_name }}</div></div>
                    <div class="meta-item"><div class="label">Commit</div><div class="value">${{ github.sha }}</div></div>
                  </div>
                </div>
                <div class="section">
                  <h2>📋 Issues Fixed / Changes in This Release</h2>
                  <div class="changelog">
                    <ul>
                      ${{ needs.build.outputs.changelog }}
                    </ul>
                  </div>
                </div>
                <div class="cta">
                  <a class="btn" href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                    👉 Final Review &amp; Approve on GitHub
                  </a>
                </div>
                <div class="footer">MediLink CI/CD · GitHub Actions · ${{ github.repository }}</div>
              </div>
            </body>
            </html>

  # Gate 2 — Manager must approve before production deployment fires
  deploy-prod:
    name: 🚀 Deploy → PRODUCTION
    needs: [build, notify-manager-prod]      # ← waits for manager notification (which itself waited for lead gate)
    if: ${{ github.event.inputs.environment == 'prod' }}
    runs-on: ubuntu-latest
    environment: production                 # GitHub Env with Manager as Required Reviewer

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run (production) — medilink-app-production
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: medilink-app-production
          image: ${{ needs.build.outputs.image_tag }}
          region: ${{ env.REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Send production deployment success notification
        uses: dawidd6/action-send-mail@v2
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          from: ${{ secrets.EMAIL_USERNAME }}
          to: ${{ env.MANAGER_EMAIL }}
          cc: ${{ env.LEAD_EMAIL }},${{ env.TEAM_CC }}
