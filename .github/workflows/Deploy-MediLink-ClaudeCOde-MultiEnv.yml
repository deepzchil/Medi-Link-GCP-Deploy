                .section { padding: 24px 32px; }
                .section h2 { font-size: 16px; color: #1a1a2e; margin: 0 0 14px; border-bottom: 2px solid #c8e6c9; padding-bottom: 8px; }
                .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
