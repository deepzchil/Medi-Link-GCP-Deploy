              </style>
            </head>
            <body>
              <div class="wrapper">
                <div class="header">
                  <h1>🔔 Deployment Approval Required</h1>
                  <p>Hi ${{ env.LEAD_NAME }}, your approval is needed before this release goes live.</p>
                </div>
                <div class="section">
                  <span class="badge">⏳ Pending Approval</span>&nbsp;&nbsp;<span class="env-pill">TEST</span>
                  <br><br>
                  <div class="meta-grid">
                    <div class="meta-item"><div class="label">Environment</div><div class="value">Test</div></div>
                    <div class="meta-item"><div class="label">Cloud Run Service</div><div class="value">medilink-app-test</div></div>
                    <div class="meta-item"><div class="label">Requested by</div><div class="value">${{ github.actor }}</div></div>
                    <div class="meta-item"><div class="label">Run #</div><div class="value">${{ github.run_number }}</div></div>
                    <div class="meta-item"><div class="label">Branch</div><div class="value">${{ github.ref_name }}</div></div>
                    <div class="meta-item"><div class="label">Commit</div><div class="value">${{ github.sha }}</div></div>
                  </div>
                </div>
                <div class="section">
                  <h2>📋 Issues Fixed / Changes in This Release</h2>
                  <div class="changelog">
                    <ul>
                      ${{ needs.build.outputs.changelog }}
                    </ul>
                  </div>
                </div>
                <div class="cta">
                  <a class="btn" href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                    👉 Review &amp; Approve on GitHub
                  </a>
                </div>
                <div class="footer">
                  MediLink CI/CD · GitHub Actions · ${{ github.repository }}<br>
                  This deployment will wait until you approve or reject in GitHub Actions.
                </div>
              </div>
            </body>
            </html>

  deploy-test:
    name: 🚀 Deploy → TEST
    needs: [build, notify-lead-test]
    if: ${{ github.event.inputs.environment == 'test' }}
    runs-on: ubuntu-latest
    environment: test           # GitHub Environment with Lead as Required Reviewer

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run (test) — medilink-app-test
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: medilink-app-test
          image: ${{ needs.build.outputs.image_tag }}
          region: ${{ env.REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Send post-deployment confirmation to Lead
        uses: dawidd6/action-send-mail@v2
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          from: ${{ secrets.EMAIL_USERNAME }}
          to: ${{ env.LEAD_EMAIL }}
          cc: ${{ env.TEAM_CC }}
          subject: "✅ [TEST] MediLink deployed successfully — Run #${{ github.run_number }}"
