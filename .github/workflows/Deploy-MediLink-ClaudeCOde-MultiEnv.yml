                .footer { background: #f4f6f9; padding: 16px 32px; text-align: center; font-size: 12px; color: #9e9e9e; }
                .env-pill { background: #e8f5e9; color: #2e7d32; font-weight: 700; padding: 2px 10px; border-radius: 12px; font-size: 13px; }
