                .section { padding: 24px 32px; }
                .section h2 { font-size: 16px; color: #1a1a2e; margin: 0 0 14px; border-bottom: 2px solid #ffe0b2; padding-bottom: 8px; }
                .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
                .meta-item { background: #fff8f0; border-radius: 8px; padding: 12px 14px; }
                .meta-item .label { font-size: 11px; text-transform: uppercase; color: #fb8c00; font-weight: 600; letter-spacing: 0.5px; }
                .meta-item .value { font-size: 14px; color: #1a1a2e; margin-top: 4px; font-weight: 500; }
                .changelog { background: #fff8f0; border-left: 4px solid #f57c00; border-radius: 0 8px 8px 0; padding: 14px 18px; }
