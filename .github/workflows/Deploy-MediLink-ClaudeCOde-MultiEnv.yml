name: Deploy MediLink App on Multi Env

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  DOTNET_VERSION: 8.0.x
  SERVICE_NAME: medilink-app
  ARTIFACT_REPO: hospital-repo
  LEAD_EMAIL: ${{ vars.LEAD_EMAIL }}
  LEAD_NAME: ${{ vars.LEAD_NAME }}
  MANAGER_EMAIL: ${{ vars.MANAGER_EMAIL }}
  MANAGER_NAME: ${{ vars.MANAGER_NAME }}
  TEAM_CC: ${{ vars.TEAM_CC }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build & push Docker image to Artifact Registry
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: 🔨 Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore HospitalMS.csproj

      - name: Build
        run: dotnet build HospitalMS.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish HospitalMS.csproj --configuration Release --no-build -o publish

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build & push Docker image
        run: |
          docker build -t "${{ steps.meta.outputs.image_tag }}" .
          docker push "${{ steps.meta.outputs.image_tag }}"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" -20)
          else
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)")
          fi
          LOG="${LOG//'%'/'%25'}"
          LOG="${LOG//$'\n'/'%0A'}"
          LOG="${LOG//$'\r'/'%0D'}"
          echo "changelog=$LOG" >> "$GITHUB_OUTPUT"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — DEV deployment (no approval needed)
#   Service: medilink-app-dev
# ─────────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: 🚀 Deploy → DEV
    needs: build
    if: ${{ github.event.inputs.environment == 'dev' }}
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run (dev) — medilink-app-dev
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: medilink-app-dev
          image: ${{ needs.build.outputs.image_tag }}
          region: ${{ env.REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Send deployment notification to Lead
        uses: dawidd6/action-send-mail@v2
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          from: ${{ secrets.EMAIL_USERNAME }}
          to: ${{ env.LEAD_EMAIL }}
          cc: ${{ env.TEAM_CC }}
          subject: "✅ [DEV] MediLink deployed successfully — ${{ github.run_number }}"
          content_type: text/html
          body: |
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="UTF-8">
              <style>
                body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 0; }
                .wrapper { max-width: 640px; margin: 32px auto; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
                .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); padding: 28px 32px; color: #fff; }
                .header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 0.3px; }
                .header p  { margin: 6px 0 0; opacity: 0.85; font-size: 14px; }
                .badge { display: inline-block; background: #e8f5e9; color: #2e7d32; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
                .section { padding: 24px 32px; }
                .section h2 { font-size: 16px; color: #1a1a2e; margin: 0 0 14px; border-bottom: 2px solid #e8eaf6; padding-bottom: 8px; }
                .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
                .meta-item { background: #f8f9ff; border-radius: 8px; padding: 12px 14px; }
                .meta-item .label { font-size: 11px; text-transform: uppercase; color: #7986cb; font-weight: 600; letter-spacing: 0.5px; }
                .meta-item .value { font-size: 14px; color: #1a1a2e; margin-top: 4px; font-weight: 500; }
                .changelog { background: #f8f9ff; border-left: 4px solid #1a73e8; border-radius: 0 8px 8px 0; padding: 14px 18px; }
                .changelog ul { margin: 0; padding-left: 20px; }
                .changelog li { font-size: 14px; color: #333; line-height: 1.7; }
                .footer { background: #f4f6f9; padding: 16px 32px; text-align: center; font-size: 12px; color: #9e9e9e; }
                .env-pill { background: #e3f2fd; color: #1565c0; font-weight: 700; padding: 2px 10px; border-radius: 12px; font-size: 13px; }
              </style>
            </head>
            <body>
              <div class="wrapper">
                <div class="header">
                  <h1>🚀 MediLink — Deployment Report</h1>
                  <p>Automated notification from GitHub Actions</p>
                </div>
                <div class="section">
                  <span class="badge">✅ Success</span>&nbsp;&nbsp;<span class="env-pill">DEV</span>
                  <br><br>
                  <div class="meta-grid">
                    <div class="meta-item"><div class="label">Environment</div><div class="value">Development</div></div>
                    <div class="meta-item"><div class="label">Cloud Run Service</div><div class="value">medilink-app-dev</div></div>
                    <div class="meta-item"><div class="label">Triggered by</div><div class="value">${{ github.actor }}</div></div>
                    <div class="meta-item"><div class="label">Run #</div><div class="value">${{ github.run_number }}</div></div>
                    <div class="meta-item"><div class="label">Branch</div><div class="value">${{ github.ref_name }}</div></div>
                    <div class="meta-item"><div class="label">Commit</div><div class="value">${{ github.sha }}</div></div>
                  </div>
                </div>
                <div class="section">
                  <h2>📋 Changes Included in This Release</h2>
                  <div class="changelog">
                    <ul>
                      ${{ needs.build.outputs.changelog }}
                    </ul>
                  </div>
                </div>
                <div class="footer">
                  MediLink CI/CD · GitHub Actions · ${{ github.repository }}
                </div>
              </div>
            </body>
            </html>

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — TEST: notify lead → wait for approval → deploy
#   Service: medilink-app-test
# ─────────────────────────────────────────────────────────────────────────────
