# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — PROD: notify lead → lead gate → notify manager → manager gate → deploy
#   Service: medilink-app-production
# ─────────────────────────────────────────────────────────────────────────────
  notify-lead-prod:
    name: 📧 Notify Lead — PROD approval required
    needs: build
    if: ${{ github.event.inputs.environment == 'prod' }}
    runs-on: ubuntu-latest

    steps:
      - name: Send approval request email to Lead
        uses: dawidd6/action-send-mail@v2
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          from: ${{ secrets.EMAIL_USERNAME }}
          to: ${{ env.LEAD_EMAIL }}
          cc: ${{ env.TEAM_CC }}
          subject: "🔴 [PROD] Lead Approval Required — MediLink Deploy #${{ github.run_number }}"
          content_type: text/html
          body: |
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="UTF-8">
              <style>
                body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 0; }
                .wrapper { max-width: 640px; margin: 32px auto; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
