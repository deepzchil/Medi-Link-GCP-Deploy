name: Polyglot CI/CD (Angular + .NET + GCS)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

env:
  BUCKET_NAME: medilink-artifacts
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:

# ==================================================
# 1. AUTO DETECT PROJECT TYPE + PATH
# ==================================================
  detect:
    runs-on: ubuntu-latest
    outputs:
      app-type: ${{ steps.detect.outputs.app-type }}
      app-path: ${{ steps.detect.outputs.app-path }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if find . -name "package.json" | grep -q package.json; then
            echo "app-type=angular" >> $GITHUB_OUTPUT
            APP_PATH=$(find . -name package.json | head -n 1 | xargs dirname)
            echo "app-path=$APP_PATH" >> $GITHUB_OUTPUT

          elif find . -name "*.csproj" | grep -q csproj; then
            echo "app-type=dotnet" >> $GITHUB_OUTPUT
            APP_PATH=$(find . -name "*.csproj" | head -n 1 | xargs dirname)
            echo "app-path=$APP_PATH" >> $GITHUB_OUTPUT

          else
            echo "No supported project found"
            exit 1
          fi

# ==================================================
# 2. BUILD JOB (ANGULAR OR DOTNET)
# ==================================================
  build:
    needs: detect
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

# ---------------- ANGULAR ----------------
      - name: Setup Node
        if: needs.detect.outputs.app-type == 'angular'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Angular deps
        if: needs.detect.outputs.app-type == 'angular'
        working-directory: ${{ needs.detect.outputs.app-path }}
        run: npm ci

      - name: Build Angular
        if: needs.detect.outputs.app-type == 'angular'
        working-directory: ${{ needs.detect.outputs.app-path }}
        run: npm run build -- --configuration=development

# ---------------- .NET ----------------
      - name: Setup .NET
        if: needs.detect.outputs.app-type == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore .NET
        if: needs.detect.outputs.app-type == 'dotnet'
        working-directory: ${{ needs.detect.outputs.app-path }}
        run: dotnet restore *.csproj

      - name: Build .NET
        if: needs.detect.outputs.app-type == 'dotnet'
        working-directory: ${{ needs.detect.outputs.app-path }}
        run: dotnet build *.csproj --configuration Release --no-restore

# ==================================================
# 3. PACKAGE OUTPUT
# ==================================================
      - name: Create ZIP
        run: |
          mkdir release

          if [ "${{ needs.detect.outputs.app-type }}" = "angular" ]; then
            cp -r ${{ needs.detect.outputs.app-path }}/dist/* release/
          else
            cp -r ${{ needs.detect.outputs.app-path }}/bin release/
          fi

          zip -r build.zip release

# ==================================================
# 4. AUTH TO GCP
# ==================================================
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v2

# ==================================================
# 5. UPLOAD TO GCS (ENVIRONMENT NAMED ZIP + RETENTION)
# ==================================================
      - name: Upload to GCS
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ENV=${{ github.event.inputs.environment }}

          ZIP_NAME="build_${ENV}_${TIMESTAMP}.zip"
          GCS_PATH="gs://$BUCKET_NAME/$ENV"

          echo "Uploading: $ZIP_NAME"

          # Upload new build
          gsutil cp build.zip $GCS_PATH/$ZIP_NAME

          echo "Uploaded to $GCS_PATH/$ZIP_NAME"

          ##################################################
          # RETENTION POLICY - KEEP ONLY LAST 5 BUILDS
          ##################################################
          echo "Applying retention policy (keep last 5 builds)..."

          FILES=$(gsutil ls $GCS_PATH/ 2>/dev/null | sort)

          COUNT=$(echo "$FILES" | wc -l | tr -d ' ')

          echo "Total files in $ENV: $COUNT"

          if [ "$COUNT" -gt 5 ]; then
              DELETE_COUNT=$((COUNT - 5))

              echo "Deleting $DELETE_COUNT old builds..."

              echo "$FILES" | head -n $DELETE_COUNT | while read file
              do
                echo "Deleting: $file"
                gsutil rm "$file"
              done
          else
              echo "Retention OK - no cleanup needed"
          fi