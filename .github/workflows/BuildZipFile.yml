name: Build the project Multi ENV CI/CD into ZIP (Angular + .NET + GCS)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

        default: 'prod'

env:
  BUCKET_NAME: medilink-artifacts
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:

# ==================================================
# 1. DETECT PROJECT TYPE + PATH
# ==================================================
  detect:
    runs-on: ubuntu-latest
    outputs:
      app-type: ${{ steps.detect.outputs.app-type }}
      app-path: ${{ steps.detect.outputs.app-path }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if find . -name "package.json" | grep -q package.json; then
            echo "app-type=angular" >> $GITHUB_OUTPUT
            APP_PATH=$(find . -name package.json | head -n 1 | xargs dirname)
            echo "app-path=$APP_PATH" >> $GITHUB_OUTPUT

          elif find . -name "*.csproj" | grep -q csproj; then
            echo "app-type=dotnet" >> $GITHUB_OUTPUT
            APP_PATH=$(find . -name "*.csproj" | head -n 1 | xargs dirname)
            echo "app-path=$APP_PATH" >> $GITHUB_OUTPUT

          else
            echo "❌ No supported project found"
            exit 1
          fi

# ==================================================
# 2. BUILD + VERSIONING
# ==================================================
  build:
    needs: detect
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

# ---------------- VERSIONING ----------------
      - name: Set version
        id: version
        run: |
          ENV="${{ github.event.inputs.environment }}"
          RUN=${{ github.run_number }}

          BASE_VERSION="1.0.0"

          if [ "$ENV" = "prod" ]; then
            VERSION="${BASE_VERSION}.${RUN}"
          elif [ "$ENV" = "test" ]; then
            VERSION="${BASE_VERSION}-test.${RUN}"
          else
            VERSION="${BASE_VERSION}-dev.${RUN}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build Version: $VERSION"

# ---------------- ANGULAR ----------------
      - name: Setup Node
        if: needs.detect.outputs.app-type == 'angular'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Angular deps
        if: needs.detect.outputs.app-type == 'angular'
        working-directory: ${{ needs.detect.outputs.app-path }}
        run: npm ci

      - name: Inject version (Angular)
        if: needs.detect.outputs.app-type == 'angular'
        run: |
          echo "export const BUILD_VERSION = '$VERSION';" > ${{ needs.detect.outputs.app-path }}/src/environments/version.ts

      - name: Build Angular
        if: needs.detect.outputs.app-type == 'angular'
        working-directory: ${{ needs.detect.outputs.app-path }}
        run: npm run build -- --configuration=${{ github.event.inputs.environment }}
        env:
          NODE_OPTIONS: --max_old_space_size=6144

# ---------------- .NET ----------------
      - name: Setup .NET
        if: needs.detect.outputs.app-type == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore .NET
        if: needs.detect.outputs.app-type == 'dotnet'
        working-directory: ${{ needs.detect.outputs.app-path }}
        run: dotnet restore *.csproj

      - name: Build .NET
        if: needs.detect.outputs.app-type == 'dotnet'
        working-directory: ${{ needs.detect.outputs.app-path }}
        run: dotnet build *.csproj --configuration Release --no-restore

      - name: Publish .NET
        if: needs.detect.outputs.app-type == 'dotnet'
        working-directory: ${{ needs.detect.outputs.app-path }}
        run: dotnet publish *.csproj -c Release -o publish

# ==================================================
# 3. PACKAGE OUTPUT
# ==================================================
      - name: Create ZIP
        run: |
          mkdir release

          if [ "${{ needs.detect.outputs.app-type }}" = "angular" ]; then
            cp -r ${{ needs.detect.outputs.app-path }}/dist/* release/
          else
            cp -r ${{ needs.detect.outputs.app-path }}/publish/* release/
          fi

          zip -r build_${{ steps.version.outputs.version }}.zip release

# ==================================================
# 4. AUTH TO GCP
# ==================================================
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v2

# ==================================================
# 5. UPLOAD TO GCS + RETENTION
# ==================================================
      - name: Upload to GCS
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ENV=${{ github.event.inputs.environment }}

          ZIP_NAME="build_${ENV}_${TIMESTAMP}_v${{ steps.version.outputs.version }}.zip"
          GCS_PATH="gs://$BUCKET_NAME/$ENV"

          echo "Uploading: $ZIP_NAME"

          gsutil cp build_${{ steps.version.outputs.version }}.zip $GCS_PATH/$ZIP_NAME

          echo "Uploaded to $GCS_PATH/$ZIP_NAME"

          ##################################################
          # RETENTION POLICY - KEEP LAST 5 BUILDS
          ##################################################
          FILES=$(gsutil ls $GCS_PATH/ 2>/dev/null | sort)
          COUNT=$(echo "$FILES" | wc -l | tr -d ' ')

          if [ "$COUNT" -gt 5 ]; then
            DELETE_COUNT=$((COUNT - 5))

            echo "$FILES" | head -n $DELETE_COUNT | while read file
            do
              echo "Deleting: $file"
              gsutil rm "$file"
            done
          else
            echo "Retention OK"
          fi